<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glänzi Reinigungsservice</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --primary:#0a1f44;
    --gold:#d4af37;
}

/* BODY */
body{
    margin:0;
    font-family:Segoe UI;
    background:#f4f6f9;
}

/* HEADER */
header{
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=1600&q=100') center/cover;
    color:white;
    text-align:center;
    padding:120px 20px;
}

/* SECTION */
.section{
    padding:40px 20px;
}

/* CARDS (صور الخدمات) */
.service-box{
    position:relative;
    margin-bottom:25px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.service-box img{
    width:100%;
    height:230px;
    object-fit:cover;
    transition:0.4s;
}

.service-box:hover img{
    transform:scale(1.05);
}

.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;
    background:linear-gradient(transparent,rgba(0,0,0,0.9));
    color:white;
    font-size:20px;
    font-weight:bold;
}

/* CTA */
.cta{
    background:var(--primary);
    color:white;
    text-align:center;
    padding:50px 20px;
}

/* WHATSAPP BUTTON (احترافي جدًا) */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25d366;
    color:white;
    padding:18px;
    border-radius:50%;
    font-size:26px;
    text-decoration:none;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
    animation:pulse 1.5s infinite;
}

/* ANIMATION */
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* HOVER */
.whatsapp:hover{
    background:#1ebe5d;
    transform:scale(1.15);
}
</style>
</head>

<body>

<header>
<h1>Glänzi Reinigungsservice</h1>
<p>Glänzi im Haus, Sorgen raus</p>
</header>

<section class="section">

<!-- Büro -->
<div class="service-box">
<img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=100">
<div class="overlay">Büroreinigung</div>
</div>

<!-- Fenster -->
<div class="service-box">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1200&q=100">
<div class="overlay">Fensterreinigung</div>
</div>

<!-- Treppenhaus -->
<div class="service-box">
<img src="https://images.unsplash.com/photo-1560185007-c5ca9d2c014d?auto=format&fit=crop&w=1200&q=100">
<div class="overlay">Treppenhausreinigung</div>
</div>

</section>

<!-- CTA -->
<section class="cta">
<h2>Jetzt Kontakt aufnehmen</h2>
<p>📞 +49 163 4895527</p>
<p>📧 glanzi.service@gmail.com</p>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/491634895527">
<i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
